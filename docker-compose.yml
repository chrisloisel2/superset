# ═══════════════════════════════════════════════════════════════════════════════
# SuperHive — Superset + Hive uniquement
# HiveServer2 externe : 192.168.88.5:20000 (via spool)
# MongoDB externe     : 192.168.88.17:27017
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL : meta-DB Superset ────────────────────────────────────────────
  postgres:
    image: postgres:13
    container_name: superhive_postgres
    restart: always
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Superset init (schéma DB + admin) ────────────────────────────────────────
  superset-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superhive_init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: superset-init
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: "hadoop_red_superset_secret_2024!"
      SUPERSET_DB_URI: "postgresql+psycopg2://superset:superset123@postgres:5432/superset"
      SUPERSET_ADMIN_PASSWORD: "Admin123456"
      # Hive externe via spool
      HIVE_HOST: "192.168.88.5"
      HIVE_PORT: "20000"
      # MongoDB externe
      MONGODB_URI: "mongodb://admin:admin123@192.168.88.17:27017/"
      # AWS S3
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-eu-west-1}"
      AWS_S3_BUCKET: "${AWS_S3_BUCKET}"
      # Spool proxy
      HTTP_PROXY: "http://192.168.88.5:3128"
      HTTPS_PROXY: "http://192.168.88.5:3128"

  # ── Superset webserver ────────────────────────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superhive_superset
    restart: always
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: superset
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: "hadoop_red_superset_secret_2024!"
      SUPERSET_DB_URI: "postgresql+psycopg2://superset:superset123@postgres:5432/superset"
      # Hive externe via spool
      HIVE_HOST: "192.168.88.5"
      HIVE_PORT: "20000"
      # MongoDB externe
      MONGODB_URI: "mongodb://admin:admin123@192.168.88.17:27017/"
      # AWS S3
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-eu-west-1}"
      AWS_S3_BUCKET: "${AWS_S3_BUCKET}"
      # Spool proxy
      HTTP_PROXY: "http://192.168.88.5:3128"
      HTTPS_PROXY: "http://192.168.88.5:3128"
    volumes:
      - superset_home:/app/superset_home
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── SFTP Sync : HDD → PostgreSQL (robotics) ──────────────────────────────────
  sftp-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superhive_sftp_sync
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: sftp-sync
      HDD_HOST: "192.168.88.82"
      HDD_PORT: "22"
      HDD_USER: "exoria"
      HDD_PASSWORD: "Admin123456"
      HDD_BRONZE: "/mnt/storage/bronze"
      HDD_SILVER: "/mnt/storage/silver"
      HDD_GOLD:   "/mnt/storage/gold"
      HDD_INBOX:  "/mnt/inbox"
      ROBOTICS_DB_URI: "postgresql://superset:superset123@postgres:5432/robotics"
      SUPERSET_URL: "http://superset:8088"
      SUPERSET_USER: "admin"
      SUPERSET_PASSWORD: "Admin123456"
      SYNC_INTERVAL: "60"
    command: ["python3", "/app/scripts/sftp_sync.py", "--watch", "--interval", "60"]

volumes:
  postgres_data:
  superset_home:

networks:
  default:
    name: superhive-network
